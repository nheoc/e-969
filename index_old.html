<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>E-969 Simulator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    /* Page base */
    html, body {
      margin: 0;
      background: #0f1a24; /* optional brand */
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }

    /* A fluid wrapper around the original 1000px canvas */
    .sim-wrapper {
      /* Let the simulator scale down when embedded in a narrow column */
      width: min(100%, 1000px);
      margin: 0 auto;
    }

    /* Header area: replacing <table background="..."> with a div */
    .header {
      width: 100%;
      aspect-ratio: 1000 / 158; /* keeps the same proportions */
      background: url("Images/E-969_upper_blank.jpg") center no-repeat;
      background-size: contain; /* scale the background image */
      border: 1px solid #23384e;
      position: relative;
    }

    /* Button bar content over the header image */
    .header-inner {
      position: absolute;
      inset: 0; /* fill the header */
      display: grid;
      grid-template-columns: 60px 10px 20px 85px 32px 1fr 32px 85px 20px 85px auto;
      align-items: center;
      padding: 10px 0;
    }

    /* Text row area (centered) */
    .display-text {
      text-align: center;
      padding-top: 10px;
    }

    /* Make all inline images scale with container width */
    img.responsive {
      max-width: 100%;
      height: auto;
      display: block;
    }

    /* Lower panel image (keypad/touch areas) */
    .lower {
      margin: 12px auto;
      /* center below header, capped to wrapper width */
      width: 100%;
      text-align: center;
    }

    /* Optional: fine-tune borders to match your original table look */
    .border-1 {
      border: 1px solid #23384e;
    }

    /* Rise and mobile friendliness: keep things usable at narrow widths */
    @media (max-width: 900px) {
      .header-inner {
        grid-template-columns: 40px 10px 20px 70px 20px 1fr 20px 70px 10px 70px auto;
      }
    }
  </style>
</head>
