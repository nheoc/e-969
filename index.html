<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>NHEOC E-969 Simulator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    /* ---- Page-level layout: main (left) + sidebar (right) ---- */
    html, body {
      height: 100%;
      margin: 0;
      background: #0f1a24; /* optional: match your brand */
    }

    .layout {
      display: grid;
      grid-template-columns: 1fr /* main area */ 
                             /* responsive sidebar: fixed but bounded */
                             minmax(260px, 320px); 
      gap: 0;
      min-height: 100vh; /* ensures full-height layout */
    }

    /* ---- Left: main simulator ---- */
    .main {
      position: relative;
      overflow: hidden; /* prevent scrollbars if child uses 100% height */
      background: #000; /* optional */
    }
    .main iframe {
      width: 100%;
      height: 100vh;   /* fill available height */
      border: 0;
    }

    /* ---- Right: 3 stacked panes (30% / 50% / 20%) ---- */
    .sidebar {
      display: grid;
      grid-template-rows: 30% 50% 20%;
      height: 100vh;     /* matches main area height */
      overflow: hidden;  /* each pane scrolls independently */
      background: #112433; /* optional */
    }

    .pane {
      border-left: 1px solid #314a63; /* subtle divider */
      border-bottom: 1px solid #314a63;
      overflow: auto;
    }
    .pane:last-child {
      border-bottom: 0;
    }
    .pane iframe {
      width: 100%;
      height: 100%;
      border: 0;
      background: #0b1b2a;
    }

    /* ---- Responsive behavior: collapse sidebar below main on narrow screens ---- */
    @media (max-width: 900px) {
      .layout {
        grid-template-columns: 1fr;    /* single column */
        grid-template-rows: auto auto; /* main + sidebar stack */
      }
      .sidebar {
        height: auto;                   /* let panes size naturally */
        grid-template-rows: auto auto auto; /* each pane collapses to content height */
      }
      .main iframe {
        height: 60vh;                  /* give main a reasonable height on small screens */
      }
    }
  </style>
</head>

<body>
  <div class="layout">
    <!-- Left: your simulator -->
    <section class="main" aria-label="E-969 Simulator">
      <!-- If the simulator entry point is index_old.html, keep it here -->
      index_old.html" title="E-969 Simulator"></iframe>
    </section>

    <!-- Right: three panes -->
    <aside class="sidebar" aria-label="Right information column">
      <!-- TopRight (30%) -->
      <div class="pane">
        Additional%20web%20pages/Whelen%20E-969%20Simulator%20banner.html" 
                title="Whelen E-969 Simulator banner"></iframe>
      </div>

      <!-- MiddleRight (50%) -->
      <div class="pane">
        title="MiddleRight (placeholder)"></iframe>
      </div>

      <!-- BottomRight (20%) -->
      <div class="pane">
        Additional%20web%20pages/HSEM%20banner.html" 
                title="HSEM Banner"></iframe>
      </div>
    </aside>
  </div>
</body>
</html>
